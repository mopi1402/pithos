packages:
  # All packages in the packages directory (root level)
  - "packages/*"

  # All packages in subdirectories (e.g., packages/main/*, packages/kanon/*, etc.)
  - "packages/*/*"

  # Examples in pithos
  - "packages/pithos/examples/*"

  # Exclude tmp directory
  - "!packages/tmp/**"

  # Integration demos are standalone projects (they use @pithos/core from npm)
  - "!packages/main/integrations/*"

  # Landscape website is a standalone project
  - "!packages/main/landscape-website"

  # Bundle analyzer is a standalone project
  - "!packages/main/pithos-bundle-analyzer"

onlyBuiltDependencies:
  - esbuild
